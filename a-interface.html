<!DOCTYPE html>
<html lang="en">
<head>
    <style>
        body { margin: 0; background: #fff; font-family: 'Tahoma', sans-serif; display: flex; flex-direction: column; height: 100vh; }
        #chat-container { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; }
        .msg { padding: 8px 12px; border-radius: 5px; max-width: 80%; font-size: 13px; line-height: 1.4; }
        .user { background: #000080; color: white; align-self: flex-end; }
        .ai { background: #e0e0e0; color: black; align-self: flex-start; border: 1px solid #808080; }
        
        #input-area { display: flex; padding: 10px; background: #c0c0c0; border-top: 2px solid #fff; gap: 5px; }
        input { flex: 1; border: 2px inset white; padding: 5px; outline: none; }
        button { background: #c0c0c0; border: 2px outset white; cursor: pointer; padding: 0 15px; font-weight: bold; }
        button:active { border-style: inset; }
    </style>
</head>
<body>
    <div id="chat-container">
        <div class="msg ai">Hello! I'm your StealthOS Assistant. How can I help you today?</div>
    </div>
    <form id="input-area">
        <input type="text" id="user-input" placeholder="Type a message..." autocomplete="off">
        <button type="submit">Send</button>
    </form>

    <script>
        const form = document.getElementById('input-area');
        const input = document.getElementById('user-input');
        const container = document.getElementById('chat-container');

        form.onsubmit = async (e) => {
            e.preventDefault();
            const text = input.value.trim();
            if (!text) return;

            // Add user message to UI
            addMsg(text, 'user');
            input.value = '';

            try {
                const response = await fetch('/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ messages: [{ role: 'user', content: text }] })
                });

                const reader = response.body.getReader();
                let aiMsg = addMsg('', 'ai');
                
                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;
                    const chunk = new TextDecoder().decode(value);
                    aiMsg.innerText += chunk;
                    container.scrollTop = container.scrollHeight;
                }
            } catch (err) {
                addMsg("Error: Could not connect to AI server.", 'ai');
            }
        };

        function addMsg(text, type) {
            const div = document.createElement('div');
            div.className = `msg ${type}`;
            div.innerText = text;
            container.appendChild(div);
            container.scrollTop = container.scrollHeight;
            return div;
        }

        async function sendMsg() {
    const text = input.value.trim();
    if (!text) return;

    addMessage(text, 'user');
    input.value = '';

    try {
        const response = await fetch('/api/chat', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ message: text })
        });
        
        const data = await response.json();
        if (data.reply) {
            addMessage(data.reply, 'ai');
        } else {
            addMessage("Error: " + data.error, 'ai');
        }
    } catch (e) {
        addMessage("Server connection failed.", 'ai');
    }
}
    </script>
</body>
</html>
