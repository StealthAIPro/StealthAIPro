<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StealthOS | Multi-Engine</title>
    <style>
        :root {
            --bg-teal: #008080;
            --silver: #c0c0c0;
            --win-blue: #000080;
            --border-light: #ffffff;
            --border-dark: #808080;
        }

        body, html { margin: 0; padding: 0; height: 100%; background: var(--bg-teal); font-family: 'Tahoma', sans-serif; overflow: hidden; }

        /* Desktop */
        #desktop { height: calc(100vh - 40px); padding: 20px; display: flex; flex-direction: column; flex-wrap: wrap; gap: 20px; align-content: flex-start; }
        .icon { width: 75px; display: flex; flex-direction: column; align-items: center; color: white; text-shadow: 1px 1px black; cursor: pointer; text-align: center; font-size: 11px; }
        .icon img { width: 38px; height: 38px; margin-bottom: 5px; image-rendering: pixelated; }

        /* Windows */
        .window { position: absolute; background: var(--silver); border: 2px solid; border-color: var(--border-light) var(--border-dark) var(--border-dark) var(--border-light); display: none; flex-direction: column; z-index: 10; min-width: 300px; box-shadow: 2px 2px 0px black; }
        .title-bar { background: var(--win-blue); color: white; padding: 3px 6px; display: flex; justify-content: space-between; align-items: center; font-weight: bold; cursor: move; font-size: 12px; }
        .title-controls button { width: 18px; height: 16px; font-size: 10px; background: var(--silver); border: 1px solid; border-color: white black black white; cursor: pointer; display: flex; align-items: center; justify-content: center; }
        .win-content { flex: 1; background: white; border: 2px inset white; overflow: hidden; }
        iframe { width: 100%; height: 100%; border: none; background: white; }

        /* Taskbar */
        #taskbar { position: fixed; bottom: 0; width: 100%; height: 40px; background: var(--silver); border-top: 2px solid white; display: flex; align-items: center; padding: 0 5px; z-index: 100; box-sizing: border-box; }
        #start-btn { height: 28px; padding: 0 10px; border: 2px solid; border-color: white black black white; background: var(--silver); font-weight: bold; display: flex; align-items: center; gap: 5px; cursor: pointer; font-size: 12px; }
        #start-btn:active { border-color: black white white black; padding: 1px 9px -1px 11px; }

        /* Status Tray */
        .tray { margin-left: auto; display: flex; align-items: center; gap: 10px; padding: 0 10px; border-left: 2px solid var(--border-dark); font-size: 11px; border-top: 1px solid var(--border-dark); height: 25px; box-shadow: inset 1px 1px black; }
        #status-dot { width: 8px; height: 8px; border-radius: 50%; background: #ff4b4b; border: 1px solid #000; box-shadow: 0 0 4px #ff4b4b; }

        /* Proxy Bar */
        .proxy-nav { padding: 4px; display: flex; gap: 4px; background: var(--silver); border-bottom: 1px solid var(--border-dark); }
        #engine-select { background: white; border: 2px inset white; font-size: 11px; }
        #url-bar { flex: 1; padding: 3px; border: 2px inset white; font-family: 'Tahoma'; }
        .proxy-nav button { border: 2px outset white; background: var(--silver); cursor: pointer; font-size: 11px; padding: 2px 10px; }
        .proxy-nav button:active { border: 2px inset white; }
    </style>
</head>
<body>

<div id="desktop">
    <div class="icon" onclick="openWin('browser')">
        <img src="https://win98icons.alexmeub.com/icons/png/world-0.png">
        <span>Internet Explorer</span>
    </div>
    <div class="icon" onclick="openWin('ai')">
        <img src="https://win98icons.alexmeub.com/icons/png/msagent-0.png">
        <span>Stealth AI</span>
    </div>
    <div class="icon" onclick="openWin('games')">
        <img src="https://win98icons.alexmeub.com/icons/png/joystick-0.png">
        <span>Games</span>
    </div>
    <div class="icon" onclick="openWin('settings')">
        <img src="https://win98icons.alexmeub.com/icons/png/settings_gear-0.png">
        <span>Settings</span>
    </div>
    <div class="icon" onclick="openWin('taskmgr')">
        <img src="https://win98icons.alexmeub.com/icons/png/task_manager-0.png">
        <span>Task Manager</span>
    </div>
</div>

<div id="win-browser" class="window" style="width: 800px; height: 550px; top: 30px; left: 50px;">
    <div class="title-bar">
        <span>Internet Explorer</span>
        <div class="title-controls"><button onclick="closeWin('browser')">X</button></div>
    </div>
    <div class="proxy-nav">
        <select id="engine-select">
            <option value="uv">Ultraviolet</option>
            <option value="sj">Scramjet</option>
        </select>
        <input type="text" id="url-bar" placeholder="Enter URL or search Google...">
        <button onclick="go()">Go</button>
    </div>
    <div class="win-content"><iframe id="proxy-frame"></iframe></div>
</div>

<div id="win-games" class="window" style="width: 500px; height: 400px; top: 120px; left: 150px;">
    <div class="title-bar"><span>Games Explorer</span><div class="title-controls"><button onclick="closeWin('games')">X</button></div></div>
    <div class="win-content"><iframe src="g.html"></iframe></div>
</div>

<div id="win-ai" class="window" style="width: 350px; height: 500px; top: 80px; left: 50px;">
    <div class="title-bar"><span>AI Assistant</span><div class="title-controls"><button onclick="closeWin('ai')">X</button></div></div>
    <div class="win-content"><iframe src="a-interface.html"></iframe></div>
</div>

<div id="win-taskmgr" class="window" style="width: 300px; height: 250px; top: 200px; left: 400px;">
    <div class="title-bar"><span>Task Manager</span><div class="title-controls"><button onclick="closeWin('taskmgr')">X</button></div></div>
    <div class="win-content" style="padding: 10px; font-size: 12px;">
        <div>Memory Usage: <span id="mem-usage">Loading...</span></div>
        <div>Engine Status: <span id="engine-status">Checking...</span></div>
    </div>
</div>

<div id="taskbar">
    <button id="start-btn">Start</button>
    <div class="tray">
        <div id="status-dot"></div>
        <span id="clock">12:00 PM</span>
    </div>
</div>

<script src="/uv/uv.bundle.js"></script>
<script src="/uv.config.js"></script>
<script src="/scramjet/scramjet.all.js"></script>

<script>
    // 1. ENGINE INITIALIZATION
    async function initEngines() {
        if ('serviceWorker' in navigator) {
            try {
                // Register UV
                await navigator.serviceWorker.register('/uv.sw.js', { scope: __uv$config.prefix });
                
                // Register Scramjet (via your sw.js)
                await navigator.serviceWorker.register('/sw.js');
                
                document.getElementById('status-dot').style.background = '#00ff00';
                document.getElementById('status-dot').style.boxShadow = '0 0 5px #00ff00';
                document.getElementById('engine-status').innerText = "All Systems Ready";
            } catch (err) {
                console.error("SW Registration failed:", err);
                document.getElementById('engine-status').innerText = "SW ERROR: " + err.message;
            }
        }
    }
    initEngines();

    // 2. SEARCH & NAVIGATION
    const urlBar = document.getElementById('url-bar');
    const proxyFrame = document.getElementById('proxy-frame');
    const engineSelect = document.getElementById('engine-select');

    function go() {
        let url = urlBar.value.trim();
        if (!url) return;
        
        if (!url.startsWith('http')) {
            url = url.includes('.') ? 'https://' + url : 'https://www.google.com/search?q=' + encodeURIComponent(url);
        }

        if (engineSelect.value === 'uv') {
            proxyFrame.src = __uv$config.prefix + __uv$config.encodeUrl(url);
        } else {
            // Scramjet encoding
            const { ScramjetController } = $scramjetLoadController();
            const sj = new ScramjetController();
            proxyFrame.src = "/scramjet/" + sj.encodeUrl(url);
        }
    }

    urlBar.addEventListener('keypress', (e) => { if (e.key === 'Enter') go(); });

    // 3. WINDOW LOGIC
    function openWin(id) { document.getElementById('win-' + id).style.display = 'flex'; }
    function closeWin(id) { document.getElementById('win-' + id).style.display = 'none'; }

    // Draggable Windows
    document.querySelectorAll('.window').forEach(win => {
        const bar = win.querySelector('.title-bar');
        bar.onmousedown = (e) => {
            let ox = e.clientX - win.offsetLeft;
            let oy = e.clientY - win.offsetTop;
            document.onmousemove = (e) => { win.style.left = (e.clientX-ox)+'px'; win.style.top = (e.clientY-oy)+'px'; };
            document.onmouseup = () => { document.onmousemove = null; };
        };
    });

    // 4. CLOCK & STATS
    setInterval(() => {
        document.getElementById('clock').innerText = new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
    }, 1000);

    setInterval(() => {
        if (document.getElementById('win-taskmgr').style.display === 'flex') {
            fetch('/api/stats').then(r => r.json()).then(data => {
                document.getElementById('mem-usage').innerText = data.ram;
            });
        }
    }, 3000);
</script>
</body>
</html>
