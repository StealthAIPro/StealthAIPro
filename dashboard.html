<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StealthOS</title>
    <style>
        :root {
            --bg-teal: #008080;
            --silver: #c0c0c0;
            --win-blue: #000080;
            --border-light: #ffffff;
            --border-dark: #808080;
        }

        body, html { margin: 0; padding: 0; height: 100%; background: var(--bg-teal); font-family: 'Tahoma', sans-serif; overflow: hidden; }

        /* Desktop */
        #desktop { height: calc(100vh - 40px); padding: 20px; display: flex; flex-direction: column; flex-wrap: wrap; gap: 20px; align-content: flex-start; }
        .icon { width: 75px; display: flex; flex-direction: column; align-items: center; color: white; text-shadow: 1px 1px black; cursor: pointer; text-align: center; font-size: 12px; }
        .icon img { width: 42px; height: 42px; margin-bottom: 5px; }

        /* Windows */
        .window { position: absolute; background: var(--silver); border: 2px solid; border-color: var(--border-light) var(--border-dark) var(--border-dark) var(--border-light); display: none; flex-direction: column; z-index: 10; min-width: 300px; }
        .title-bar { background: var(--win-blue); color: white; padding: 3px 6px; display: flex; justify-content: space-between; align-items: center; font-weight: bold; cursor: move; }
        .title-controls button { width: 18px; height: 16px; font-size: 10px; background: var(--silver); border: 1px solid; border-color: white black black white; cursor: pointer; }
        .win-content { flex: 1; background: white; border: 2px inset white; overflow: hidden; }
        iframe { width: 100%; height: 100%; border: none; }

        /* Taskbar */
        #taskbar { position: fixed; bottom: 0; width: 100%; height: 40px; background: var(--silver); border-top: 2px solid white; display: flex; align-items: center; padding: 0 5px; z-index: 100; }
        #start-btn { height: 30px; padding: 0 10px; border: 2px solid; border-color: white black black white; background: var(--silver); font-weight: bold; display: flex; align-items: center; gap: 5px; cursor: pointer; }
        #start-btn:active { border-color: black white white black; }

        /* Status Tray */
        .tray { margin-left: auto; display: flex; align-items: center; gap: 10px; padding: 0 10px; border-left: 2px solid var(--border-dark); font-size: 12px; }
        #status-dot { width: 10px; height: 10px; border-radius: 50%; background: #ff4b4b; border: 1px solid #000; }

        /* Proxy Bar */
        .proxy-nav { padding: 5px; display: flex; gap: 5px; background: var(--silver); }
        #url-bar { flex: 1; padding: 3px; border: 2px inset white; }
    </style>
</head>
<body>

<div id="desktop">
    <div class="icon" onclick="openWin('browser')">
        <img src="https://win98icons.alexmeub.com/icons/png/world-0.png">
        <span>Web Proxy</span>
    </div>
    <div class="icon" onclick="openWin('ai')">
        <img src="https://win98icons.alexmeub.com/icons/png/msagent-0.png">
        <span>Stealth AI</span>
    </div>
    <div class="icon" onclick="openWin('games')">
        <img src="https://win98icons.alexmeub.com/icons/png/joystick-0.png">
        <span>Games</span>
    </div>
    <div class="icon" onclick="openWin('settings')">
        <img src="https://win98icons.alexmeub.com/icons/png/settings_gear-0.png">
        <span>Settings</span>
    </div>
    <div class="icon" onclick="openWin('taskmgr')">
        <img src="https://win98icons.alexmeub.com/icons/png/task_manager-0.png">
        <span>Task Manager</span>
    </div>
</div>

<div id="win-games" class="window" style="width: 500px; height: 400px; top: 120px; left: 150px;">
    <div class="title-bar">
        <span>Games Explorer</span>
        <div class="title-controls"><button onclick="closeWin('games')">X</button></div>
    </div>
    <div class="win-content">
        <iframe src="g.html" style="width: 100%; height: 100%; border: none;"></iframe>
    </div>
</div>

<div id="win-browser" class="window" style="width: 800px; height: 500px; top: 50px; left: 100px;">
    <div class="title-bar"><span>Internet Explorer</span><div class="title-controls"><button onclick="closeWin('browser')">X</button></div></div>
    <div class="proxy-nav">
        <input type="text" id="url-bar" placeholder="Enter URL or search...">
        <button onclick="go()">Go</button>
    </div>
    <div class="win-content"><iframe id="proxy-frame"></iframe></div>
</div>

<div id="win-ai" class="window" style="width: 350px; height: 500px; top: 80px; left: 50px;">
    <div class="title-bar"><span>AI Assistant</span><div class="title-controls"><button onclick="closeWin('ai')">X</button></div></div>
    <div class="win-content"><iframe src="a-interface.html"></iframe></div>
</div>

<div id="win-settings" class="window" style="width: 300px; height: 350px; top: 150px; left: 200px;">
    <div class="title-bar">
        <span>System Settings</span>
        <div class="title-controls"><button onclick="closeWin('settings')">X</button></div>
    </div>
    <div class="win-content" style="padding: 15px; display: flex; flex-direction: column; gap: 10px;">
        <label>Wallpaper Color:</label>
        <input type="color" id="set-bg-color" value="#008080">
        
        <label>Desktop Name:</label>
        <input type="text" id="set-os-name" placeholder="StealthOS">

        <label>Clock Format:</label>
        <select id="set-clock">
            <option value="12">12-Hour</option>
            <option value="24">24-Hour</option>
        </select>

        <button onclick="saveSettings()" style="margin-top: 10px; padding: 5px;">Apply Changes</button>
    </div>
</div>

<div id="win-taskmgr" class="window" style="width: 350px; height: 400px; top: 100px; left: 300px;">
    <div class="title-bar">
        <span>Task Manager</span>
        <div class="title-controls"><button onclick="closeWin('taskmgr')">X</button></div>
    </div>
    <div class="win-content" style="padding: 10px; background: #eee;">
        <table style="width: 100%; border-collapse: collapse; font-size: 12px; background: white;">
            <tr style="background: #000080; color: white;">
                <th style="text-align: left; padding: 2px;">Process</th>
                <th style="text-align: right; padding: 2px;">CPU</th>
                <th style="text-align: right; padding: 2px;">Mem</th>
            </tr>
            <tr>
                <td>System Idle</td>
                <td id="cpu-idle" style="text-align: right;">98%</td>
                <td style="text-align: right;">0.1 MB</td>
            </tr>
            <tr style="background: #e1f5fe;">
                <td>Ultraviolet Proxy</td>
                <td id="cpu-uv" style="text-align: right;">1%</td>
                <td id="mem-uv" style="text-align: right;">42 MB</td>
            </tr>
            <tr>
                <td>Stealth AI</td>
                <td id="cpu-ai" style="text-align: right;">0%</td>
                <td id="mem-ai" style="text-align: right;">12 MB</td>
            </tr>
        </table>
        <div style="margin-top: 20px; border: 2px inset white; height: 100px; background: black; position: relative;" id="cpu-graph">
            <div style="color: #0f0; font-size: 10px; padding: 5px;">CPU Usage History</div>
        </div>
    </div>
</div>

<div id="taskbar">
    <button id="start-btn">Start</button>
    <div class="tray">
        <div id="status-dot"></div>
        <span id="clock">12:00 PM</span>
    </div>
</div>

<script src="/uv/uv.bundle.js"></script>
<script src="/uv.config.js"></script>
<script>
    // Load Settings on Start
window.addEventListener('load', () => {
    const config = JSON.parse(localStorage.getItem('stealth_settings')) || {};
    
    if (config.bg) document.body.style.background = config.bg;
    if (config.name) document.getElementById('start-btn').innerText = config.name;
    
    // Fill the inputs with current values
    document.getElementById('set-bg-color').value = config.bg || '#008080';
    document.getElementById('set-os-name').value = config.name || 'Start';
});

function saveSettings() {
    const newBg = document.getElementById('set-bg-color').value;
    const newName = document.getElementById('set-os-name').value;
    const clockPref = document.getElementById('set-clock').value;

    const settings = {
        bg: newBg,
        name: newName,
        clock: clockPref
    };

    localStorage.setItem('stealth_settings', JSON.stringify(settings));
    
    // Apply immediately
    document.body.style.background = newBg;
    document.getElementById('start-btn').innerText = newName;
    
    alert("Settings Saved!");
}
    function openWin(id) { document.getElementById('win-' + id).style.display = 'flex'; }
    function closeWin(id) { document.getElementById('win-' + id).style.display = 'none'; }

    const urlBar = document.getElementById('url-bar');
    const proxyFrame = document.getElementById('proxy-frame');

    function go() {
        let url = urlBar.value.trim();
        if (!url.startsWith('http')) {
            url = url.includes('.') ? 'https://' + url : 'https://www.google.com/search?q=' + encodeURIComponent(url);
        }
        proxyFrame.src = __uv$config.prefix + __uv$config.encodeUrl(url);
    }

    urlBar.addEventListener('keypress', (e) => { if (e.key === 'Enter') go(); });

    // Clock & Status
    setInterval(() => {
        document.getElementById('clock').innerText = new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
    }, 1000);

    // Bare Status Check
    fetch('/bare/').then(() => document.getElementById('status-dot').style.background = '#00ff00');

    // Draggable Logic
    document.querySelectorAll('.window').forEach(win => {
        const bar = win.querySelector('.title-bar');
        bar.onmousedown = (e) => {
            let ox = e.clientX - win.offsetLeft;
            let oy = e.clientY - win.offsetTop;
            document.onmousemove = (e) => { win.style.left = (e.clientX-ox)+'px'; win.style.top = (e.clientY-oy)+'px'; };
            document.onmouseup = () => { document.onmousemove = null; };
        };
    });

    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('/uv.sw.js', { scope: __uv$config.prefix });
    }
    function updateTaskMgr() {
    fetch('/api/stats')
        .then(res => res.json())
        .then(data => {
            document.getElementById('mem-uv').innerText = data.ram;
            document.getElementById('cpu-uv').innerText = data.cpu;
            document.getElementById('cpu-idle').innerText = (100 - parseFloat(data.cpu)).toFixed(1) + '%';
        });
}

// Update every 3 seconds when the window is open
setInterval(() => {
    if (document.getElementById('win-taskmgr').style.display === 'flex') {
        updateTaskMgr();
    }
}, 3000);
</script>
</body>
</html>
