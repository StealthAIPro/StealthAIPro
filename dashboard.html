<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StealthOS</title>
    <style>
        :root {
            --bg-teal: #008080;
            --silver: #c0c0c0;
            --win-blue: #000080;
            --border-light: #ffffff;
            --border-dark: #808080;
        }

        * { box-sizing: border-box; }
        body, html { margin: 0; padding: 0; height: 100%; background: var(--bg-teal); font-family: 'Tahoma', sans-serif; overflow: hidden; }

        /* Desktop Icons */
        #desktop {
            height: calc(100vh - 40px);
            padding: 20px;
            display: flex;
            flex-direction: column;
            flex-wrap: wrap;
            align-content: flex-start;
            gap: 25px;
        }

        .icon {
            width: 75px;
            display: flex;
            flex-direction: column;
            align-items: center;
            color: white;
            text-shadow: 1px 1px black;
            cursor: pointer;
            font-size: 12px;
            text-align: center;
        }

        .icon img { width: 40px; height: 40px; margin-bottom: 5px; image-rendering: pixelated; }
        .icon:active { filter: brightness(0.8); }

        /* Window Styling */
        .window {
            position: absolute;
            background: var(--silver);
            border: 2px solid;
            border-color: var(--border-light) var(--border-dark) var(--border-dark) var(--border-light);
            display: none;
            flex-direction: column;
            box-shadow: 2px 2px 10px rgba(0,0,0,0.3);
            z-index: 10;
        }

        .title-bar {
            background: var(--win-blue);
            color: white;
            padding: 3px 5px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-weight: bold;
            font-size: 13px;
        }

        .title-controls button {
            width: 18px; height: 16px;
            font-size: 10px; font-weight: bold;
            background: var(--silver);
            border: 1px solid;
            border-color: white black black white;
            cursor: pointer;
        }

        .win-content { flex: 1; background: white; border: 2px inset var(--border-light); position: relative; }
        iframe { width: 100%; height: 100%; border: none; }

        /* Taskbar */
        #taskbar {
            position: fixed; bottom: 0; width: 100%;
            height: 40px; background: var(--silver);
            border-top: 2px solid var(--border-light);
            display: flex; align-items: center; padding: 0 5px; gap: 10px;
            z-index: 100;
        }

        #start-btn {
            height: 30px; padding: 0 10px;
            font-weight: bold; display: flex; align-items: center; gap: 5px;
            border: 2px solid; border-color: white black black white;
            cursor: pointer; background: var(--silver);
        }

        #start-btn:active { border-color: black white white black; }

        .task-item {
            padding: 5px 15px; background: #e0e0e0; border: 1px solid var(--border-dark);
            font-size: 12px; cursor: default;
        }

        /* Start Menu Overlay */
        #start-menu {
            position: absolute; bottom: 40px; left: 0;
            width: 200px; background: var(--silver);
            border: 2px solid; border-color: white black black white;
            display: none; flex-direction: column; z-index: 101;
        }

        .menu-item { padding: 10px; display: flex; align-items: center; gap: 10px; cursor: pointer; }
        .menu-item:hover { background: var(--win-blue); color: white; }

        /* Specific Window Sizes */
        #win-proxy { width: 800px; height: 500px; top: 50px; left: 150px; }
        #win-ai { width: 400px; height: 550px; top: 100px; left: 50px; }
        #win-games { width: 900px; height: 600px; top: 30px; left: 200px; }

        .proxy-nav { padding: 5px; background: var(--silver); display: flex; gap: 5px; }
        #url-bar { flex: 1; border: 2px inset white; padding: 3px; }
    </style>
</head>
<body>

<div id="desktop">
    <div class="icon" onclick="openWin('proxy')">
        <img src="https://win98icons.alexmeub.com/icons/png/world-0.png">
        <span>Web Proxy</span>
    </div>
    <div class="icon" onclick="openWin('ai')">
        <img src="https://win98icons.alexmeub.com/icons/png/msagent-0.png">
        <span>Stealth AI</span>
    </div>
    <div class="icon" onclick="openWin('games')">
        <img src="https://win98icons.alexmeub.com/icons/png/joystick-0.png">
        <span>Games</span>
    </div>
</div>

<div id="win-proxy" class="window">
    <div class="title-bar">
        <span>Internet Explorer</span>
        <div class="title-controls"><button onclick="closeWin('proxy')">X</button></div>
    </div>
    <div class="proxy-nav">
        <select id="engine-select">
            <option value="uv">UV</option>
            <option value="rh">RH</option>
        </select>
        <input type="text" id="url-bar" placeholder="Search or type URL...">
    </div>
    <div class="win-content"><iframe id="proxy-frame"></iframe></div>
</div>

<div id="win-ai" class="window">
    <div class="title-bar">
        <span>AI Assistant</span>
        <div class="title-controls"><button onclick="closeWin('ai')">X</button></div>
    </div>
    <div class="win-content">
        <iframe src="/api/chat-ui"></iframe> </div>
</div>

<div id="win-games" class="window">
    <div class="title-bar">
        <span>Arcade</span>
        <div class="title-controls"><button onclick="closeWin('games')">X</button></div>
    </div>
    <div class="win-content">
        <iframe id="games-frame"></iframe>
    </div>
</div>

<div id="taskbar">
    <div id="start-btn" onclick="toggleStart()">
        <img src="https://win98icons.alexmeub.com/icons/png/windows-0.png" width="16">
        Start
    </div>
    <div id="active-tasks" style="display: flex; gap: 5px;"></div>
</div>

<div id="start-menu">
    <div class="menu-item" onclick="location.reload()"><span>🔄 Restart OS</span></div>
    <div class="menu-item" onclick="alert('History Purged')"><span>🗑️ Clear History</span></div>
    <div class="menu-item" onclick="window.location.href='https://google.com'"><span>🚪 Emergency Exit</span></div>
</div>

<script src="/uv/uv.bundle.js"></script>
<script src="/uv.config.js"></script>

<script>
    function openWin(id) {
        document.getElementById('win-' + id).style.display = 'flex';
        toggleStart(false);
    }
    function closeWin(id) {
        document.getElementById('win-' + id).style.display = 'none';
    }
    function toggleStart(force) {
        const menu = document.getElementById('start-menu');
        menu.style.display = (force === false) ? 'none' : (menu.style.display === 'flex' ? 'none' : 'flex');
    }

    // Proxy Engine Logic
    const urlBar = document.getElementById('url-bar');
    const engineSel = document.getElementById('engine-select');
    const proxyFrame = document.getElementById('proxy-frame');

    urlBar.onkeydown = (e) => {
        if (e.key === 'Enter') {
            let url = urlBar.value.trim();
            if (!url.startsWith('http')) {
                url = url.includes('.') ? 'https://' + url : 'https://www.google.com/search?q=' + encodeURIComponent(url);
            }
            
            if (engineSel.value === 'uv') {
                proxyFrame.src = __uv$config.prefix + __uv$config.encodeUrl(url);
            } else {
                proxyFrame.src = '/rh/' + url;
            }
        }
    };

    // Auto-register UV for the proxy window
    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('/uv.sw.js', { scope: __uv$config.prefix });
    }
</script>
</body>
</html>
