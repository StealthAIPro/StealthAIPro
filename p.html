<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Stealth v4 | Engine Switcher</title>
    <style>
        :root { --bg: #0a0a0a; --panel: #1a1a1a; --accent: #A020F0; --text: #fff; }
        body { margin: 0; background: var(--bg); color: var(--text); font-family: sans-serif; overflow: hidden; height: 100vh; display: flex; flex-direction: column; }
        
        .nav { display: flex; align-items: center; padding: 10px 15px; background: var(--panel); gap: 10px; border-bottom: 1px solid #333; }
        input { flex: 1; background: #000; border: 1px solid #333; color: #fff; padding: 8px 15px; border-radius: 20px; outline: none; }
        
        /* Settings Toggle */
        .settings-group { display: flex; align-items: center; gap: 8px; font-size: 12px; }
        select { background: #000; color: #fff; border: 1px solid #444; padding: 5px; border-radius: 5px; cursor: pointer; }
        
        .status { display: flex; align-items: center; gap: 5px; }
        #dot { width: 8px; height: 8px; border-radius: 50%; background: #ff4b4b; }

        .view { flex: 1; background: #fff; position: relative; }
        iframe { width: 100%; height: 100%; border: none; }
    </style>
</head>
<body>

<div class="nav">
    <div class="settings-group">
        <label>Engine:</label>
        <select id="engine-select">
            <option value="uv">Ultraviolet (SW)</option>
            <option value="rh">Rammerhead (No-SW)</option>
        </select>
    </div>

    <input type="text" id="url-input" placeholder="Enter URL or search...">

    <div class="status">
        <div id="dot"></div>
        <span id="status-text">Initializing...</span>
    </div>
</div>

<div class="view">
    <iframe id="ifr"></iframe>
</div>

<script src="/uv/uv.bundle.js"></script>
<script src="/uv.config.js"></script>

<script>
    const ifr = document.getElementById('ifr');
    const urlInp = document.getElementById('url-input');
    const engineSel = document.getElementById('engine-select');
    const statusDot = document.getElementById('dot');
    const statusMsg = document.getElementById('status-text');

    // Persistence: Remember what the user chose
    let currentEngine = localStorage.getItem('engine') || 'uv';
    engineSel.value = currentEngine;

    async function setupEngine() {
        if (currentEngine === 'rh') {
            // Rammerhead is instant because it doesn't use Service Workers
            setReady("RAMMERHEAD");
            return;
        }

        if ('serviceWorker' in navigator) {
            try {
                await navigator.serviceWorker.register('/uv.sw.js', { scope: __uv$config.prefix });
                if (navigator.serviceWorker.controller) {
                    setReady("ULTRAVIOLET");
                } else {
                    statusMsg.innerText = "Syncing...";
                    navigator.serviceWorker.addEventListener('controllerchange', () => location.reload());
                }
            } catch (e) {
                statusMsg.innerText = "SW Error";
            }
        }
    }

    function setReady(name) {
        statusDot.style.background = '#00d97e';
        statusMsg.innerText = name + " READY";
    }

    // Handle Search/Navigate
    urlInp.onkeydown = (e) => {
        if (e.key === 'Enter') {
            let url = urlInp.value.trim();
            if (!url.startsWith('http')) {
                url = (url.includes('.') && !url.includes(' ')) ? 'https://' + url : 'https://www.google.com/search?q=' + encodeURIComponent(url);
            }

            if (currentEngine === 'uv') {
                ifr.src = __uv$config.prefix + __uv$config.encodeUrl(url);
            } else {
                // Rammerhead routing - goes to the /rh/ endpoint in index.js
                ifr.src = '/rh/' + url;
            }
        }
    };

    // Switch Engines
    engineSel.onchange = () => {
        localStorage.setItem('engine', engineSel.value);
        location.reload();
    };

    setupEngine();
</script>
</body>
</html>
