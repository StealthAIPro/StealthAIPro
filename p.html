<!DOCTYPE html>
<html>
<head>
    <title>StealthOS | Private Search</title>
    <style>
        body { background: #1a1a1a; color: white; font-family: 'Segoe UI', sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .search-container { width: 60%; text-align: center; }
        input { width: 100%; padding: 15px 25px; border-radius: 30px; border: 2px solid #333; background: #252525; color: white; outline: none; font-size: 18px; transition: 0.3s; }
        input:focus { border-color: #0078d4; box-shadow: 0 0 15px rgba(0, 120, 212, 0.4); }
        .controls { margin-top: 20px; display: flex; gap: 10px; align-items: center; }
        select { background: #333; color: white; border: none; padding: 8px 12px; border-radius: 5px; cursor: pointer; }
        .status { margin-top: 10px; font-size: 12px; color: #666; }
        .active-engine { color: #00ff88; font-weight: bold; }
    </style>
</head>
<body>
    <div class="search-container">
        <h1>Stealth Search</h1>
        <input type="text" id="uv-address" placeholder="Search freely or enter URL...">
        
        <div class="controls">
            <span>Engine:</span>
            <select id="engine-select">
                <option value="uv">Ultraviolet (Default)</option>
                <option value="scramjet">Scramjet (Fast/Beta)</option>
            </select>
            <div class="status">System Status: <span id="status-text" class="active-engine">Initializing...</span></div>
        </div>
    </div>

    <script src="/uv/uv.bundle.js"></script>
    <script src="/uv.config.js"></script>
    
    <script src="/scramjet/scramjet.all.js"></script>

    <script>
        const input = document.getElementById('uv-address');
        const engineSelect = document.getElementById('engine-select');
        const statusText = document.getElementById('status-text');

        // 1. Initialize Engines
        async function initEngines() {
            try {
                // Register UV
                if ('serviceWorker' in navigator) {
                    await navigator.serviceWorker.register('/uv.sw.js', { scope: __uv$config.prefix });
                    
                    // Scramjet Registration
                    // Note: We use a separate sw.js or the scramjet bundle
                    await navigator.serviceWorker.register('/sw.js'); 
                }
                statusText.innerText = "READY";
            } catch (err) {
                statusText.innerText = "SW ERROR";
                console.error(err);
            }
        }

        initEngines();

        // 2. Handle Search
        input.addEventListener('keypress', async (e) => {
            if (e.key === 'Enter') {
                let url = input.value.trim();
                if (!url.startsWith('http')) {
                    url = url.includes('.') ? 'https://' + url : 'https://www.google.com/search?q=' + encodeURIComponent(url);
                }

                const engine = engineSelect.value;
                
                if (engine === 'uv') {
                    // Launch via Ultraviolet
                    window.location.href = __uv$config.prefix + __uv$config.encodeUrl(url);
                } else {
                    // Launch via Scramjet
                    // Scramjet uses a global variable from its 'all' bundle
                    const scramjet = new $scramjet.ScramjetController();
                    window.location.href = "/scramjet/" + scramjet.encodeUrl(url);
                }
            }
        });

        // Inside your <script> tag in p.html
const { ScramjetController } = $scramjetLoadController();

// Define where your Scramjet files live
const scramjet = new ScramjetController({
    files: {
        wasm: "/scramjet/scramjet.wasm.wasm",
        all: "/scramjet/scramjet.all.js",
    }
});

async function initEngines() {
    try {
        // Register UV
        await navigator.serviceWorker.register('/uv.sw.js', { scope: __uv$config.prefix });
        
        // Register Scramjet (Scramjet usually sits at root /)
        await navigator.serviceWorker.register('/sw.js');
        
        // Initialize the Scramjet controller
        await scramjet.init();
        
        statusText.innerText = "READY";
    } catch (err) {
        statusText.innerText = "SW ERROR: " + err.message;
        console.error(err);
    }
}
    </script>
</body>
</html>
