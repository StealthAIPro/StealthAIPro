<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stealth v3 | Dual Engine</title>
    <style>
        :root { 
            --bg: #0d0d0d; --panel: #1a1a1a; --accent: #A020F0; 
            --text: #ffffff; --status-off: #ff4b4b; --status-on: #00d97e;
        }
        body, html { margin: 0; padding: 0; height: 100%; background: var(--bg); color: var(--text); font-family: -apple-system, sans-serif; overflow: hidden; }
        
        /* Layout */
        .browser { display: flex; flex-direction: column; height: 100vh; }
        .nav { display: flex; align-items: center; padding: 12px 18px; background: var(--panel); gap: 15px; border-bottom: 1px solid #2a2a2a; }
        
        /* Search Bar */
        .search-container { flex: 1; position: relative; }
        #url-input { 
            width: 100%; background: #000; border: 1px solid #333; color: #fff; 
            padding: 10px 20px; border-radius: 20px; outline: none; font-size: 14px; 
            transition: 0.3s;
        }
        #url-input:focus { border-color: var(--accent); box-shadow: 0 0 10px rgba(160, 32, 240, 0.2); }

        /* Controls */
        .engine-picker { background: #000; color: #fff; border: 1px solid #333; padding: 8px; border-radius: 8px; cursor: pointer; }
        .status-pill { display: flex; align-items: center; gap: 8px; background: #000; padding: 6px 12px; border-radius: 15px; border: 1px solid #222; font-size: 11px; }
        #status-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--status-off); }

        /* Viewport */
        .view { flex: 1; background: #fff; position: relative; }
        iframe { width: 100%; height: 100%; border: none; }
        
        .hidden { display: none; }
    </style>
</head>
<body>

<div class="browser">
    <div class="nav">
        <select id="engine-select" class="engine-picker">
            <option value="uv">Ultraviolet (SW)</option>
            <option value="rh">Rammerhead (Fast)</option>
        </select>

        <div class="search-container">
            <input type="text" id="url-input" placeholder="Enter URL or search Google...">
        </div>

        <div class="status-pill">
            <div id="status-dot"></div>
            <span id="status-msg">OFFLINE</span>
        </div>
        <button onclick="location.reload()" style="background:none; border:none; color:white; cursor:pointer;">🔄</button>
    </div>

    <div class="view">
        <iframe id="ifr"></iframe>
    </div>
</div>

<script src="/uv/uv.bundle.js"></script>
<script src="/uv.config.js"></script>

<script>
    const ifr = document.getElementById('ifr');
    const urlInp = document.getElementById('url-input');
    const engineSel = document.getElementById('engine-select');
    const dot = document.getElementById('status-dot');
    const msg = document.getElementById('status-msg');

    // Persistence
    let engine = localStorage.getItem('engine') || 'uv';
    engineSel.value = engine;

    async function init() {
        if (engine === 'rh') {
            // Rammerhead doesn't need a Service Worker!
            updateStatus(true, "RAMMERHEAD READY");
            return;
        }

        if ('serviceWorker' in navigator) {
            try {
                const reg = await navigator.serviceWorker.register('/uv.sw.js', { 
                    scope: __uv$config.prefix 
                });

                // Safari "Kick": Ping the worker to ensure it's active
                if (reg.active) reg.active.postMessage('ping');

                if (navigator.serviceWorker.controller) {
                    updateStatus(true, "UV READY");
                } else {
                    msg.innerText = "SYNCING...";
                    // Automatic refresh once if Safari is being stubborn
                    if (!sessionStorage.getItem('init-retry')) {
                        sessionStorage.setItem('init-retry', 'true');
                        setTimeout(() => location.reload(), 1000);
                    }
                }
            } catch (err) {
                msg.innerText = "SW BLOCKED";
            }
        }
    }

    function updateStatus(ready, text) {
        dot.style.background = ready ? 'var(--status-on)' : 'var(--status-off)';
        dot.style.boxShadow = ready ? '0 0 8px var(--status-on)' : 'none';
        msg.innerText = text;
    }

    engineSel.onchange = () => {
        localStorage.setItem('engine', engineSel.value);
        location.reload();
    };

    urlInp.onkeydown = async (e) => {
        if (e.key === 'Enter') {
            let url = urlInp.value.trim();
            if (!url) return;

            // Search engine logic
            if (!url.includes('.') || url.includes(' ')) {
                url = 'https://www.google.com/search?q=' + encodeURIComponent(url);
            } else if (!url.startsWith('http')) {
                url = 'https://' + url;
            }

            if (engine === 'uv') {
                ifr.src = __uv$config.prefix + __uv$config.encodeUrl(url);
            } else {
                // Rammerhead routing (matches the /rh/ route in your index.js)
                ifr.src = '/rh/' + url;
            }
        }
    };

    // Listen for UV claiming the page
    navigator.serviceWorker.addEventListener('controllerchange', () => {
        updateStatus(true, "UV READY");
    });

    init();
</script>

</body>
</html>
