<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Stealth | Multi-Engine</title>
    <style>
        :root { --bg: #050505; --accent: #A020F0; --panel: #111; --text: #eee; }
        body { background: var(--bg); color: var(--text); font-family: -apple-system, sans-serif; margin: 0; overflow: hidden; }
        .browser-ui { display: flex; flex-direction: column; height: 100vh; }
        .nav-bar { display: flex; padding: 12px; gap: 10px; background: var(--panel); border-bottom: 1px solid #222; align-items: center; }
        
        select { background: #000; color: white; border: 1px solid #333; padding: 8px; border-radius: 10px; outline: none; cursor: pointer; }
        input { flex: 1; background: #000; border: 1px solid #333; color: white; padding: 10px 20px; border-radius: 20px; outline: none; }
        
        .status-box { display: flex; align-items: center; gap: 8px; font-size: 11px; padding: 0 10px; }
        #status-dot { width: 8px; height: 8px; background: #ff4444; border-radius: 50%; }
        
        .view-container { flex: 1; position: relative; background: white; }
        iframe { position: absolute; width: 100%; height: 100%; border: none; }
    </style>
</head>
<body>
    <div class="browser-ui">
        <div class="nav-bar">
            <select id="engine-select">
                <option value="uv">Ultraviolet</option>
                <option value="scramjet">Scramjet</option>
            </select>
            <input type="text" id="url-input" placeholder="Search or enter URL...">
            <div class="status-box">
                <div id="status-dot"></div>
                <span id="status-text">Proxy Offline</span>
            </div>
        </div>
        <div class="view-container">
            <iframe id="proxy-frame"></iframe>
        </div>
    </div>

    <script src="/uv/uv.bundle.js"></script>
    <script src="/uv.config.js"></script>
    <script src="/scramjet.config.js"></script>

    <script>
        const engineSelect = document.getElementById('engine-select');
        const statusDot = document.getElementById('status-dot');
        const statusText = document.getElementById('status-text');
        const urlInput = document.getElementById('url-input');
        const frame = document.getElementById('proxy-frame');

        // Load saved engine
        const savedEngine = localStorage.getItem('proxy-engine') || 'uv';
        engineSelect.value = savedEngine;

        async function initProxy() {
            const engine = engineSelect.value;
            if ('serviceWorker' in navigator) {
                try {
                    let swFile = engine === 'uv' ? '/uv.sw.js' : '/sw.js';
                    let scope = engine === 'uv' ? __uv$config.prefix : __scramjet$config.prefix;

                    await navigator.serviceWorker.register(swFile, { scope: scope });
                    
                    if (navigator.serviceWorker.controller) {
                        statusDot.style.background = '#00ff88';
                        statusText.innerText = engine.toUpperCase() + ' Ready';
                    } else {
                        statusText.innerText = 'Syncing...';
                        navigator.serviceWorker.addEventListener('controllerchange', () => window.location.reload());
                    }
                } catch (err) {
                    statusText.innerText = 'Proxy Error';
                    console.error(err);
                }
            }
        }

        engineSelect.onchange = () => {
            localStorage.setItem('proxy-engine', engineSelect.value);
            location.reload();
        };

        urlInput.onkeydown = (e) => {
            if (e.key === 'Enter') {
                let url = urlInput.value.trim();
                if (!url.startsWith('http')) {
                    url = (url.includes('.') && !url.includes(' ')) ? 'https://' + url : 'https://www.google.com/search?q=' + encodeURIComponent(url);
                }

                const engine = engineSelect.value;
                if (engine === 'uv') {
                    frame.src = __uv$config.prefix + __uv$config.encodeUrl(url);
                } else {
                    frame.src = __scramjet$config.prefix + __scramjet$config.encodeUrl(url);
                }
            }
        };

        initProxy();
    </script>
</body>
</html>
