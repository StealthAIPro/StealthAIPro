<!DOCTYPE html>
<html>
<head>
    <title>Private Search</title>
    <style>
        body { background: #1a1a1a; color: white; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        input { width: 60%; padding: 15px; border-radius: 25px; border: none; outline: none; font-size: 18px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        .hint { margin-top: 20px; color: #888; font-size: 14px; }
    </style>
</head>
<body>
    <h1>Stealth Search</h1>
    <input type="text" id="uv-address" placeholder="Search freely...">
    <div class="hint">Powered by Ultraviolet</div>

    <script src="/uv/uv.bundle.js"></script>
    <script src="/uv.config.js"></script>
    <script>
        const input = document.getElementById('uv-address');
        input.addEventListener('keypress', async (e) => {
            if (e.key === 'Enter') {
                let url = input.value.trim();
                if (!url.startsWith('http')) {
                    url = url.includes('.') ? 'https://' + url : 'https://www.google.com/search?q=' + encodeURIComponent(url);
                }
                localStorage.setItem('uv-url', url);
                window.location.href = __uv$config.prefix + __uv$config.encodeUrl(url);
            }
        });

        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('/uv.sw.js', { scope: __uv$config.prefix });
        }
    </script>
</body>
</html>
